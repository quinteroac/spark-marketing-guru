name: Release Spark Tools

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: tools-linux
          path: |
            spark/tools/memory-linux-x64
            spark/tools/tavily-search-linux-x64

  build-macos:
    name: Build (macOS ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm run build:macos
      - uses: actions/upload-artifact@v4
        with:
          name: tools-macos
          path: |
            spark/tools/memory-macos-arm64
            spark/tools/tavily-search-macos-arm64

  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm run build:windows
      - uses: actions/upload-artifact@v4
        with:
          name: tools-windows
          path: |
            spark/tools/memory-win-x64.exe
            spark/tools/tavily-search-win-x64.exe

  release:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tools-linux
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: tools-macos
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: tools-windows
          path: dist/
      - name: Make Linux/macOS binaries executable
        run: chmod +x dist/memory-linux-x64 dist/tavily-search-linux-x64 dist/memory-macos-arm64 dist/tavily-search-macos-arm64
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/memory-linux-x64
            dist/tavily-search-linux-x64
            dist/memory-macos-arm64
            dist/tavily-search-macos-arm64
            dist/memory-win-x64.exe
            dist/tavily-search-win-x64.exe
          generate_release_notes: true
